version: '3.8'

services:
  backend:
    build: .
    container_name: bestpet-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres      # ✅ Igual que en tu .env
      DB_NAME: ecommerce
      DB_PORT: 5432
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: una_clave_segura
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:14
    container_name: bestpet-db
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres-data:
